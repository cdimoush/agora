# Dev agent configuration
token_env: AGORA_CITIZEN_C_TOKEN
name: citizen-c
display_name: Dev
telemetry: true
data_dir: ./data
mention_resolution: true
mention_aliases:
  Nova: agora-citizen-a
  Rex: agora-citizen-b
  Dev: agora-citizen-c

channels:
  dm: subscribe
  bot-chat: subscribe

context:
  backend: container

schedule: '1h'
exchange_cap: 5
jitter_seconds: [1.5, 4.0]
typing_indicator: true
reply_threading: false
max_response_length: 4000
