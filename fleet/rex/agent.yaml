# Rex configuration
token_env: AGORA_REX_TOKEN
name: rex
display_name: Rex
telemetry: true
data_dir: ./data
mention_resolution: true
mention_aliases:
  Nova: agora-citizen-a
  Rex: agora-citizen-b
  Dev: agora-citizen-c

channels:
  general: mention-only
  bot-chat: mention-only

context:
  backend: container

exchange_cap: 5
typing_indicator: true
reply_threading: true
jitter_seconds: [1.5, 4.0]
max_response_length: 2000
